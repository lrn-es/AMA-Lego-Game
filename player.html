function generateQuestions(n = 70) {
    const qs = [];
    const ops = ["+", "-", "×", "÷"];
    for (let i = 0; i < n; i++) {
        const op = ops[Math.floor(Math.random() * ops.length)];
        let a, b, answer;
        if (op === "+") {
            // three-digit additions
            a = Math.floor(Math.random() * 400) + 100;
            b = Math.floor(Math.random() * 400) + 100;
            answer = a + b;
        }
        else if (op === "-") {
            // results can be negative
            a = Math.floor(Math.random() * 500) + 100;
            b = Math.floor(Math.random() * 500) + 100;
            answer = a - b;
        }
        else if (op === "×") {
            // two-digit × two-digit
            a = Math.floor(Math.random() * 20) + 11;
            b = Math.floor(Math.random() * 20) + 11;
            answer = a * b;
        }
        else {
            // clean division: generate b and answer first, derive a
            b = Math.floor(Math.random() * 15) + 6; // divisor 6–20
            answer = Math.floor(Math.random() * 30) + 5; // quotient 5–34
            a = b * answer;
        }
        qs.push({ a, b, op, answer });
    }
    return qs;
}
